<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contraseña</title>
</head>
<body>

  <h1>Cambiar Contraseña</h1>

  <form id="change-password-form">
    <div>
      <label for="userId">ID de usuario</label>
      <input type="text" id="userId" placeholder="Tu ID" />
    </div>

    <div>
      <label for="oldPassword">Contraseña anterior</label>
      <input type="password" id="oldPassword" placeholder="Contraseña actual" />
    </div>

    <div>
      <label for="newPassword">Nueva contraseña</label>
      <input type="password" id="newPassword" placeholder="Nueva contraseña" />
    </div>

    <div>
      <label for="confirmPassword">Confirmar nueva contraseña</label>
      <input type="password" id="confirmPassword" placeholder="Confirma tu nueva contraseña" />
    </div>

    <button type="submit">Cambiar contraseña</button>
  </form>

  <p id="error-message" style="color: red; display: none;"></p>
  <p id="success-message" style="color: green; display: none;"></p>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="change-password.js"></script>

</body>
</html>
